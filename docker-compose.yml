services:
  postgres:
    image: postgres:16-alpine
    container_name: shoes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shoes_user
      POSTGRES_PASSWORD: shoes_pass
      POSTGRES_DB: shoes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shoes_network

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shoes_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://shoes_user:shoes_pass@postgres:5432/shoes_db
      NEXTAUTH_SECRET: your_secret_here
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - shoes_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: shoes_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shoes.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - shoes_network

volumes:
  postgres_data:

networks:
  shoes_network:
    driver: bridge